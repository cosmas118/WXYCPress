<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synesthesia</title>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans&family=Space+Mono&display=swap" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="bg"></div>
<div id="grain"></div>

<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">Synesthesia</div>

    <div class="header-right">
      <span class="tag-pill">Chapel Hill · Live Music</span>

      <div id="user-bar">
        <span id="user-name-display" style="display:none"></span>
        <button class="btn sm" id="login-btn" onclick="openLoginModal()">Sign In</button>
        <button class="btn sm" id="logout-btn" onclick="logout()" style="display:none">Sign Out</button>
        <button class="btn sm" id="admin-open-btn" style="display:none">Admin</button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main>

    <!-- ✅ TOOLBAR -->
    <div id="toolbar">

      <span class="section-label">Upcoming Shows</span>

      <!-- GENRE DROPDOWN -->
      <select id="genre-dropdown" onchange="handleGenreDropdown(this)">
        <option value="">All Genres</option>
      </select>

      <!-- VENUE DROPDOWN -->
      <select id="venue-dropdown" onchange="handleVenueDropdown(this)">
        <option value="">All Venues</option>
      </select>

      <!-- DATE SORT -->
      <button class="filter-pill" id="sort-date-btn" onclick="toggleSortDate()">
        Date ↑
      </button>

      <!-- INTEREST FILTER -->
      <button class="filter-pill" id="show-interested-btn" onclick="toggleInterestedFilter()" style="display:none">
        ★ My List
      </button>

    </div>

    <div id="loading">Loading shows…</div>
    <div id="concert-grid"></div>
    <div id="empty-state">No Shows Found</div>

  </main>

</div>

<div id="toast"></div>

<!-- ✅ YOUR JS -->
<script src="app.js"></script>

</body>
</html>
